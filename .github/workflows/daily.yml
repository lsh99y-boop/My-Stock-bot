name: Daily Stock Bot

on:
  schedule:
    # 1. 아침 7시 (해외 마감용 - UTC 22:00 전날)
    - cron: '0 22 * * *'
    # 2. 오전 9시 48분 (국내 장중 - UTC 00:48)
    - cron: '48 0 * * *'
    # 3. 오후 3시 30분 (국내 마감용 - UTC 06:30)
    - cron: '30 6 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance requests pytz

      - name: Run main.py
        run: python main.py
