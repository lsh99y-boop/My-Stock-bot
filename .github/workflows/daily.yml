name: Daily Stock Bot

on:
  schedule:
    # 1. 아침 7시 (해외 마감용 - KST 07:00 / UTC 22:00)
    # 월요일 아침 7시는 UTC로 일요일 밤이므로 요일 범위를 0-4(일-목)로 설정
    - cron: '0 22 * * 0-4'
    
    # 2. 오전 9시 43분 (국내 시작용 - KST 09:43 / UTC 00:43)
    - cron: '43 0 * * 1-5'
    
    # 3. 오후 3시 30분 (국내 마감용 - KST 15:30 / UTC 06:30)
    - cron: '30 6 * * 1-5'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 실행 속도 향상을 위한 캐싱

      - name: Install dependencies
        run: |
          pip install yfinance requests pytz

      - name: Run main.py
        run: python main.py
