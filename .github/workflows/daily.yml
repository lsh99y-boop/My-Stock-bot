name: Daily Stock Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install yfinance requests
      - name: Run main.py
        run: python main.py
