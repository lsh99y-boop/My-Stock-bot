name: Daily Stock Bot
on:
  schedule:
    - cron: '0 6 * * *'  # 한국 시간 오후 3시
  workflow_dispatch:      # 수동 테스트용
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install yfinance python-telegram-bot gnews
      - name: Run main.py
        run: python main.py
